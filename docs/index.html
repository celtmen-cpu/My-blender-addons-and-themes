<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blender Resources</title>
  <link rel="icon" href="https://images.icon-icons.com/4029/PNG/512/twitter_x_new_logo_x_rounded_icon_256078.png" type="image/png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #2c3e50;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { text-align: center; margin-bottom: 20px; font-size: 2em; color: #34495e; }
    h2 { width: 100%; font-size: 1.4em; color: #34495e; margin: 30px 0 15px; border-bottom: 2px solid #2980b9; padding-bottom: 5px; }
    p { margin: 10px 0 20px; text-align: center; }
    a { text-decoration: none; color: #2980b9; font-weight: bold; transition: 0.3s; }
    a:hover { color: #1abc9c; }

    ul { list-style: none; width: 100%; padding: 0; display: flex; flex-direction: column; gap: 15px; }
    li {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }
    .addon-name { font-size: 1em; font-weight: bold; }
    .download-btn {
      background: #2980b9;
      color: #fff !important;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
    }

    #reviewForm {
      width: 100%; max-width: 600px;
      background: rgba(255,255,255,0.25);
      border-radius: 15px; padding: 20px;
      display: flex; flex-direction: column; gap: 10px; margin-top: 20px;
    }
    #reviewForm input, #reviewForm textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    #reviewForm button { padding: 10px 15px; border-radius: 8px; border: none; background: #2980b9; color: white; cursor: pointer; }
    #status { margin-top: 10px; text-align: center; font-weight: bold; }
  </style>
</head>
<body>

<h1>My Blender Resources</h1>

<h2>Themes</h2>
<ul>
  <li>
    <div class="addon-name">MacOS Dark Liquid Glass Theme</div>
    <a href="versions/theme/liquid_glass_theme_1.0.zip" class="download-btn" onclick="handleDownload(event, 'MacOS Dark Liquid Glass Theme')">Download</a>
  </li>
</ul>

<h2>Addons</h2>
<ul>
  <li>
    <div class="addon-name">Dimension presets for social networks</div>
    <a href="versions/addons/dimensions_presets.zip" class="download-btn" onclick="handleDownload(event, 'Dimension presets for social networks')">Download</a>
  </li>
</ul>

<h2>Leave a Review</h2>
<form id="feedbackForm">
  <input type="text" id="addonName" placeholder="Addon or Theme Name" required>
  <textarea id="reviewMessage" placeholder="Your comment" rows="5" required></textarea>
  <button type="submit">Send Review</button>
  <p id="status"></p>
</form>

<script>
  // Configuration calquée sur ton script Spy Game
  const CONFIG = {
    webhook: "https://discord.com/api/webhooks/1485923983558705164/H5fJ7BT-xKHEQc9g1TeDt1Os04QMQ3g-rR4sJVD4kg0yFHv_FSSW9gK6pDJxNYyQ4bC5"
  };

  /**
   * Fonction principale d'envoi vers Discord
   */
  async function postToDiscord(data) {
    try {
      await fetch(CONFIG.webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
    } catch (e) {
      console.error("Discord Webhook Error:", e);
    }
  }

  /**
   * Gestion du clic sur les téléchargements
   */
  async function handleDownload(event, itemName) {
    event.preventDefault(); // STOP le téléchargement immédiat
    const downloadUrl = event.currentTarget.href;

    // Envoi du message (Format Embed pour plus de classe comme dans Spy Game)
    await postToDiscord({
      embeds: [{
        title: "📥 Nouveau Téléchargement",
        description: `L'utilisateur a téléchargé : **${itemName}**`,
        color: 3447003, // Bleu
        timestamp: new Date()
      }]
    });

    // On déclenche le téléchargement après un mini délai
    setTimeout(() => {
      window.location.href = downloadUrl;
    }, 150);
  }

  /**
   * Gestion du formulaire de feedback
   */
  document.getElementById('feedbackForm').onsubmit = async (e) => {
    e.preventDefault();
    const name = document.getElementById("addonName").value;
    const message = document.getElementById("reviewMessage").value;

    await postToDiscord({
      embeds: [{
        title: "⭐ Nouvel Avis Client",
        fields: [
          { name: "Ressource", value: name, inline: true },
          { name: "Commentaire", value: message }
        ],
        color: 15844367, // Or/Jaune
        timestamp: new Date()
      }]
    });

    document.getElementById("status").innerText = "✅ Merci ! Avis envoyé.";
    e.target.reset();
  };
</script>

</body>
</html>
